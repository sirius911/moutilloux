<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Connexion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{font-family:sans-serif;margin:24px}
    .card{max-width:420px;border:1px solid #ddd;border-radius:10px;padding:16px}
    label{display:block;margin-top:10px}
    input{width:100%;padding:8px;margin-top:4px}
    button{margin-top:14px;padding:10px 14px}
    .muted{color:#666;font-size:14px}
  </style>
</head>
<body>
  <div class="card">
    <h1>Connexion</h1>
    {% if form.errors %}
      <p style="color:#c00;">Identifiants incorrects.</p>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      {{ form.username.label_tag }}
      {{ form.username }}

      {{ form.password.label_tag }}
      {{ form.password }}

      <input type="hidden" name="next" value="{{ next }}">
      <button type="submit">Se connecter</button>
    </form>
    <hr style="margin:20px 0;">

    <p style="text-align:center;">
      <a href="/" style="text-decoration:none;font-weight:600;">
        ← Retour à l’accueil
      </a>
    </p>

  </div>

</body>
</html>
