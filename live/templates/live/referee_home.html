<!doctype html><html lang="fr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Arbitre</title>
<style>
body{font-family:sans-serif;margin:16px}
.card{max-width:520px;border:1px solid #ddd;border-radius:14px;padding:14px}
select,button{width:100%;padding:12px;margin-top:8px;border-radius:12px;border:1px solid #ddd}
.sim-toggle{position:fixed;top:10px;right:10px;z-index:20;width:auto;padding:8px 12px;background:#111;color:#fff;border:1px solid #333}
.sim-wrap{max-width:unset}
body.tablet-sim{background:#e8e8e8;margin:0;padding:18px}
body.tablet-sim .sim-wrap{
  width:834px;height:1112px;max-width:calc(100vw - 36px);max-height:calc(100vh - 36px);
  margin:0 auto;background:#fff;border:10px solid #1f1f1f;border-radius:18px;overflow:auto;
  box-shadow:0 18px 40px rgba(0,0,0,.25);padding:14px;box-sizing:border-box;
}
</style></head>
<body>
<button id="simToggle" class="sim-toggle" type="button">Mode tablette: OFF</button>
<div class="sim-wrap">
<div class="card">
  <h1>Arbitre</h1>

  <form method="post">
    {% csrf_token %}

    <label>Édition</label>
    {{ form.edition }}
    <label style="margin-top:10px;display:block;">Épreuve</label>
    {{ form.event }}
    <label style="margin-top:10px;display:block;">Match</label>
    {{ form.match }}

    <button type="submit">Arbitrer ce match</button>
  </form>
  
  <form method="post" action="{% url 'logout' %}" style="margin-top:12px;">
    {% csrf_token %}
    <button type="submit">Déconnexion</button>
  </form>

<a href="/" style="text-decoration:none;font-weight:600;">← Retour à l’accueil</a>
</div>
</div>

<script>
  // recharge en GET pour rafraîchir les listes
  const editionSel = document.getElementById("id_edition");
  const eventSel = document.getElementById("id_event");

  function reloadWith(params){
    const url = new URL(window.location.href);
    Object.keys(params).forEach(k => {
      if (params[k]) url.searchParams.set(k, params[k]);
      else url.searchParams.delete(k);
    });
    window.location.href = url.toString();
  }

  if (editionSel) {
    editionSel.addEventListener("change", () => {
      reloadWith({edition: editionSel.value, event: ""});
    });
  }
  if (eventSel) {
    eventSel.addEventListener("change", () => {
      reloadWith({edition: editionSel ? editionSel.value : "", event: eventSel.value});
    });
  }

  // Simulation tablette
  const KEY = "referee_tablet_sim";
  const btn = document.getElementById("simToggle");
  function applySim(enabled){
    document.body.classList.toggle("tablet-sim", enabled);
    btn.textContent = `Mode tablette: ${enabled ? "ON" : "OFF"}`;
  }
  const saved = localStorage.getItem(KEY) === "1";
  applySim(saved);
  btn.addEventListener("click", () => {
    const next = !document.body.classList.contains("tablet-sim");
    localStorage.setItem(KEY, next ? "1" : "0");
    applySim(next);
  });
</script>
</body></html>
